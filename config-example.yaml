# Buz Channel Configuration Example

channels:
  buz:
    # 全局配置 (应用于所有账号)
    enabled: true
    
    # 多账号配置
    accounts:
      # 默认账号
      default:
        enabled: true
        serverUrl: "buz-dc-ai.example.com:443"
        secretKey: "buz_sk_your_secret_key_here"
        name: "Production Buz"
        # 允许列表 - 只有这些用户可以与 AI 对话
        allowFrom:
          - "user:12345"
          - "user:67890"
        # 默认发送目标
        defaultTo: "user:12345"
        
        # 私信设置
        dm:
          policy: "allowlist"  # allowlist | blocklist | open
          allowFrom:
            - "user:12345"
        
        # 群组策略
        groupPolicy: "allowlist"
        
        # 群组配置
        groups:
          "group:11111":
            name: "AI Chat Room"
            users:
              - "user:12345"
              - "user:67890"
      
      # 测试账号
      test:
        enabled: true
        serverUrl: "localhost:9091"
        secretKey: "buz_sk_test_key"
        name: "Test Buz"
        dm:
          policy: "open"
